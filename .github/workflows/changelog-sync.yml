name: Changelog Sync

# Auto-syncs CHANGELOG.md from a published GitHub Release. The release body
# (maintained by release-drafter) is the single source of truth; this
# workflow opens a PR back to main with a Keep-a-Changelog formatted entry.
#
# Coexists with .github/workflows/go-release.yml — both fire on the same
# `release: [published]` event independently.

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync CHANGELOG.md from release notes
        env:
          # Pipe release body through env to avoid YAML special-char issues
          # with backticks, quotes, and multi-line content.
          BODY: ${{ github.event.release.body }}
        run: |
          python3 .github/scripts/sync-changelog.py \
            --version "${{ github.event.release.tag_name }}" \
            --date   "${{ github.event.release.published_at }}" \
            --changelog CHANGELOG.md \
            --repo   "${{ github.repository }}"

      - name: Open PR if CHANGELOG.md changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/changelog-sync-${{ github.event.release.tag_name }}
          delete-branch: true
          add-paths: CHANGELOG.md
          title: 'docs(changelog): sync ${{ github.event.release.tag_name }} from release notes'
          body: |
            Auto-generated by `.github/workflows/changelog-sync.yml` from the
            published release notes for **${{ github.event.release.tag_name }}**.

            Source of truth: the GitHub Release body (maintained by
            release-drafter). This PR brings `CHANGELOG.md` in sync.

            If something looks off, edit the release notes upstream and
            re-run this workflow — it is idempotent and will overwrite this
            PR's branch.

            Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>
          commit-message: |
            docs(changelog): sync ${{ github.event.release.tag_name }} from release notes

            Auto-generated by .github/workflows/changelog-sync.yml.

            Co-Authored-By: Claude Opus 4.7 (1M context) <noreply@anthropic.com>
          labels: |
            docs
            changelog-sync
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
