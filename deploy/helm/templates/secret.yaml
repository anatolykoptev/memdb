{{/*
  secret.yaml — DO NOT add secret values to values.yaml.
  This template validates that existingSecret is set and provides instructions.

  To create the required secret before helm install:

    kubectl create secret generic memdb-secrets \
      --namespace memdb \
      --from-literal=postgresPassword=<CHANGE_ME> \
      --from-literal=llmApiKey=<YOUR_LLM_API_KEY> \
      --from-literal=masterKeyHash="" \
      --from-literal=internalServiceSecret=""

  The chart DOES NOT create the secret automatically so that values never
  appear in Helm release state (which is stored in-cluster as a ConfigMap/Secret).
*/}}
{{- if not .Values.existingSecret }}
{{- fail "existingSecret must be set. Run: kubectl create secret generic memdb-secrets ..." }}
{{- end }}
