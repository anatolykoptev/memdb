---
# qdrant service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memdb.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  type: {{ .Values.qdrant.service.type }}
  ports:
    - port: {{ .Values.qdrant.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "memdb.componentSelectorLabels" (dict "root" . "component" "qdrant") | nindent 4 }}

{{- if .Values.embedServer.enabled }}
---
# embed-server service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memdb.fullname" . }}-embed-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: embed-server
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.embedServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "memdb.componentSelectorLabels" (dict "root" . "component" "embed-server") | nindent 4 }}
{{- end }}
