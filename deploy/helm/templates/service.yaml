---
# redis service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memdb.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
