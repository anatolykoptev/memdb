---
# memdb-go API service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memdb.fullname" . }}-memdb-go
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: memdb-go
spec:
  type: {{ .Values.memdbGo.service.type }}
  ports:
    - port: {{ .Values.memdbGo.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "memdb.componentSelectorLabels" (dict "root" . "component" "memdb-go") | nindent 4 }}

---
# memdb-mcp service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memdb.fullname" . }}-memdb-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: memdb-mcp
spec:
  type: {{ .Values.memdbMcp.service.type }}
  ports:
    - port: {{ .Values.memdbMcp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "memdb.componentSelectorLabels" (dict "root" . "component" "memdb-mcp") | nindent 4 }}

