apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "memdb.fullname" . }}-qdrant
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "memdb.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "memdb.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "memdb.componentSelectorLabels" (dict "root" . "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "memdb.componentSelectorLabels" (dict "root" . "component" "qdrant") | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.qdrant.grpcPort }}
              protocol: TCP
          env:
            - name: QDRANT__SERVICE__HTTP_PORT
              value: {{ .Values.qdrant.port | quote }}
            - name: QDRANT__SERVICE__GRPC_PORT
              value: {{ .Values.qdrant.grpcPort | quote }}
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes:
          - {{ .Values.qdrant.persistence.accessMode | quote }}
        {{- if .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ .Values.qdrant.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size | quote }}
  {{- else }}
      volumes:
        - name: qdrant-storage
          emptyDir: {}
  {{- end }}
