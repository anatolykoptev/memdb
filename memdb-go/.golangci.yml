version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - gosec
    - noctx
    - perfsprint
    - usestdlibvars
  settings:
    gosec:
      excludes:
        - G104
        - G304
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
        - (*database/sql.Rows).Close
        - (*github.com/jackc/pgx/v5.Rows).Close
        - (github.com/redis/go-redis/v9.UniversalClient).Close
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
