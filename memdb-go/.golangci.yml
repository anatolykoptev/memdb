version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
  settings:
    staticcheck:
      checks:
        - all
        - -S1009
        - -SA9003
        - -SA1019
        - -QF1012
        - -QF1003
        - -ST1000
        - -ST1003
        - -ST1005
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
