# Docker Compose for MemDB with Go API Gateway
# Go API Gateway → Python Backend → Neo4j + Qdrant
name: memdb-dev

services:
  # ─── Go API Gateway (new) ───────────────────────────────────────
  memdb-go:
    container_name: memdb-go-api
    build:
      context: ..
      dockerfile: memdb-go/Dockerfile
    ports:
      - "8080:8080"
    environment:
      MEMDB_GO_PORT: "8080"
      MEMDB_PYTHON_URL: "http://memdb-api:8000"
      MEMDB_LOG_LEVEL: "info"
      MEMDB_LOG_FORMAT: "json"
    depends_on:
      memdb:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 2s
    restart: unless-stopped
    networks:
      - memdb_network

  # ─── Python Backend (existing) ──────────────────────────────────
  memdb:
    container_name: memdb-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      - neo4j
      - qdrant
    environment:
      - PYTHONPATH=/app/src
      - HF_ENDPOINT=https://hf-mirror.com
      - QDRANT_HOST=qdrant-docker
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j-docker:7687
    volumes:
      - ../src:/app/src
      - .:/app/docker
    networks:
      - memdb_network

  # ─── Neo4j ──────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26.4
    container_name: neo4j-docker
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    healthcheck:
      test: wget http://localhost:7474 || exit 1
      interval: 1s
      timeout: 10s
      retries: 20
      start_period: 3s
    environment:
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_AUTH: "neo4j/12345678"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - memdb_network

  # ─── Qdrant ─────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.15.3
    container_name: qdrant-docker
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    restart: unless-stopped
    networks:
      - memdb_network

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

networks:
  memdb_network:
    driver: bridge
