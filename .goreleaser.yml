version: 2

project_name: memdb

builds:
  - id: mcp-server
    main: ./cmd/mcp-server
    binary: memdb-mcp
    dir: memdb-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

  - id: mcp-stdio-proxy
    main: ./cmd/mcp-stdio-proxy
    binary: mcp-stdio-proxy
    dir: memdb-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: anatolykoptev
    name: memdb
  draft: false
  prerelease: auto
