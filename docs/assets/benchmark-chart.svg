<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="600" height="320" fill="#ffffff" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">LoCoMo Benchmark — LLM Judge (excl cat-5)</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#6b7280">Higher is better. Methodology: Memobase-comparable, Gemini 2.5 Flash judge.</text>

  <!-- Chart area: left=160 right=560 top=62 bottom=272 -->
  <!-- X-axis scale: 0-100 maps to x=160..560 (400px) -->
  <!-- gridlines at 0,25,50,75,100 -->
  <line x1="160" y1="62"  x2="160" y2="272" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="260" y1="62"  x2="260" y2="272" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="360" y1="62"  x2="360" y2="272" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="460" y1="62"  x2="460" y2="272" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="560" y1="62"  x2="560" y2="272" stroke="#e5e7eb" stroke-width="1"/>

  <!-- X-axis labels -->
  <text x="160" y="286" text-anchor="middle" font-size="10" fill="#9ca3af">0</text>
  <text x="260" y="286" text-anchor="middle" font-size="10" fill="#9ca3af">25</text>
  <text x="360" y="286" text-anchor="middle" font-size="10" fill="#9ca3af">50</text>
  <text x="460" y="286" text-anchor="middle" font-size="10" fill="#9ca3af">75</text>
  <text x="560" y="286" text-anchor="middle" font-size="10" fill="#9ca3af">100</text>

  <!-- X axis baseline -->
  <line x1="160" y1="272" x2="560" y2="272" stroke="#d1d5db" stroke-width="1"/>

  <!-- Bars: 5 bars, bar height=28, gap=14
       Top bar y-starts:
         Row 1 (Memobase):  top=70
         Row 2 (Zep):       top=112
         Row 3 (MemOS):     top=154
         Row 4 (MemDB):     top=196
         Row 5 (Mem0):      top=238
  -->

  <!-- Bar widths: value/100 * 400 -->
  <!-- Memobase: 75.78 → 303.12px -->
  <rect x="160" y="70" width="303" height="28" fill="#9ca3af" rx="3"/>
  <text x="152" y="89" text-anchor="end" font-size="11" fill="#374151">Memobase</text>
  <text x="470" y="89" font-size="11" fill="#374151">75.78%</text>

  <!-- Zep: 75.14 → 300.56px -->
  <rect x="160" y="112" width="301" height="28" fill="#9ca3af" rx="3"/>
  <text x="152" y="131" text-anchor="end" font-size="11" fill="#374151">Zep</text>
  <text x="468" y="131" font-size="11" fill="#374151">75.14%</text>

  <!-- MemOS: 73.31 → 293.24px -->
  <rect x="160" y="154" width="293" height="28" fill="#9ca3af" rx="3"/>
  <text x="152" y="173" text-anchor="end" font-size="11" fill="#374151">MemOS</text>
  <text x="460" y="173" font-size="11" fill="#374151">73.31%</text>

  <!-- MemDB: 72.50 → 290px — HIGHLIGHTED -->
  <rect x="160" y="196" width="290" height="28" fill="#2563EB" rx="3"/>
  <text x="152" y="215" text-anchor="end" font-size="11" font-weight="bold" fill="#2563EB">MemDB v0.23.0</text>
  <!-- value label inside/after bar -->
  <text x="456" y="215" font-size="11" font-weight="bold" fill="#2563EB">72.50%</text>
  <!-- extra label below bar -->
  <text x="161" y="238" font-size="9" fill="#2563EB">← Apache-2.0  ·  self-host  ·  Pure Go  ·  3 Claude integrations</text>

  <!-- Mem0: 66.88 → 267.52px -->
  <rect x="160" y="252" width="268" height="16" fill="#9ca3af" rx="3"/>
  <text x="152" y="264" text-anchor="end" font-size="11" fill="#374151">Mem0</text>
  <text x="434" y="264" font-size="11" fill="#374151">66.88%</text>

  <!-- Footer note -->
  <text x="300" y="304" text-anchor="middle" font-size="9" fill="#9ca3af">MemDB v0.23.0 · chat-50 stratified · github.com/anatolykoptev/memdb</text>

</svg>
